<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>سراب · مكتب الحجوزات</title>
<style>
  :root{
    --bg:#14100B; --panel:#1E170F; --panel-2:#241B11; --line:rgba(201,162,78,.16);
    --text:#F3E9D8; --muted:#C2A179; --gold:#C9A24E; --bronze:#A57743; --ivory:#FBF6EC;
    --ok:#86B98A; --info:#7FB3C9; --warn:#C97B6A;
    --r:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); min-height:100vh;
    font:15px/1.55 "Segoe UI", Tahoma, "Noto Sans Arabic", "Noto Kufi Arabic", system-ui, sans-serif;
  }
  a{color:var(--gold)}
  button{font:inherit; cursor:pointer}
  input,select,textarea{
    font:inherit; color:var(--text); background:var(--panel-2);
    border:1px solid var(--line); border-radius:8px; padding:.5rem .65rem; width:100%;
    color-scheme:dark;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid rgba(201,162,78,.45); outline-offset:1px}
  ::placeholder{color:rgba(194,161,121,.55)}

  header{
    display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
    padding:.9rem 1.2rem; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, #1A140C, var(--bg));
    position:sticky; top:0; z-index:20;
  }
  .brand{display:flex; align-items:baseline; gap:.6rem}
  .brand b{font-size:1.25rem; letter-spacing:.06em; color:var(--gold)}
  .brand span{color:var(--muted); font-size:.85rem}
  .who{margin-inline-start:auto; color:var(--muted); font-size:.8rem}
  .btn{
    background:var(--gold); color:#231A0E; border:none; border-radius:999px;
    padding:.5rem 1.1rem; font-weight:700;
  }
  .btn:hover{filter:brightness(1.08)}
  .btn--ghost{background:transparent; color:var(--gold); border:1px solid var(--line)}

  .kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:.8rem; padding:1rem 1.2rem}
  .kpi{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:.8rem 1rem}
  .kpi b{display:block; font-size:1.5rem; color:var(--ivory)}
  .kpi span{color:var(--muted); font-size:.8rem}
  .kpi.gold b{color:var(--gold)}

  nav.tabs{display:flex; gap:.4rem; padding:0 1.2rem; border-bottom:1px solid var(--line); overflow-x:auto; scrollbar-width:none}
  nav.tabs button{white-space:nowrap}
  nav.tabs button{
    background:none; border:none; color:var(--muted); padding:.6rem 1rem;
    border-bottom:2px solid transparent; font-weight:600;
  }
  nav.tabs button.on{color:var(--gold); border-bottom-color:var(--gold)}

  .filters{display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; padding:.9rem 1.2rem}
  .filters .search{max-width:280px}
  .chips{display:flex; gap:.35rem; flex-wrap:wrap}
  .chip{
    background:var(--panel); color:var(--muted); border:1px solid var(--line);
    border-radius:999px; padding:.3rem .8rem; font-size:.82rem;
  }
  .chip.on{color:#231A0E; background:var(--gold); border-color:var(--gold); font-weight:700}
  .chip.ex{color:#FFD9D2; background:rgba(201,60,40,.4); border-color:transparent; text-decoration:line-through; font-weight:700}
  .filters select{width:auto}
  label.toggle{display:flex; gap:.35rem; align-items:center; color:var(--muted); font-size:.85rem; white-space:nowrap}
  label.toggle input{width:auto}
  .count{color:var(--muted); font-size:.8rem; margin-inline-start:auto}

  .wrap{padding:0 1.2rem 4rem}
  .tablebox{overflow-x:auto; border:1px solid var(--line); border-radius:var(--r); background:var(--panel)}
  table{border-collapse:collapse; width:100%; min-width:960px}
  th,td{padding:.55rem .7rem; text-align:start; border-bottom:1px solid var(--line); white-space:nowrap}
  th{color:var(--muted); font-size:.78rem; font-weight:600; position:sticky; top:0; background:var(--panel); z-index:1}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:rgba(201,162,78,.06)}
  td.num{font-variant-numeric:tabular-nums}
  .badge{border-radius:999px; padding:.15rem .6rem; font-size:.76rem; font-weight:700; display:inline-block}
  .muted{color:var(--muted)}
  .wa{
    display:inline-grid; place-items:center; width:1.7rem; height:1.7rem; border-radius:999px;
    border:1px solid var(--line); color:var(--ok); text-decoration:none; font-size:.9rem;
  }
  .wa:hover{border-color:var(--ok)}
  .empty{padding:2.2rem; text-align:center; color:var(--muted)}

  /* drawer */
  .scrim{position:fixed; inset:0; background:rgba(10,7,4,.6); backdrop-filter:blur(2px); z-index:30; display:none}
  /* Physical coordinates on purpose: translateX is physical, so the inset must be too
     (mixing logical insets with physical transforms is the RTL bug documented in
     ASSET-ANALYSIS §Phase 5.1). Drawer lives on the LEFT edge (inline-end in RTL). */
  .drawer{
    position:fixed; top:0; bottom:0; left:0; width:min(560px,100vw);
    background:var(--panel); border-right:1px solid var(--line); z-index:31;
    transform:translateX(-110%); visibility:hidden;
    transition:transform .25s ease, visibility 0s .25s;
    display:flex; flex-direction:column;
  }
  .drawer.open{transform:none; visibility:visible; transition:transform .25s ease}
  .scrim.open{display:block}
  .drawer header{position:static; background:var(--panel-2); padding:.8rem 1.1rem}
  .drawer h2{margin:0; font-size:1.05rem; color:var(--gold)}
  .drawer .body{overflow-y:auto; padding:1rem 1.1rem; display:grid; grid-template-columns:1fr 1fr; gap:.7rem .8rem; align-content:start}
  .drawer .full{grid-column:1 / -1}
  .field label{display:block; color:var(--muted); font-size:.76rem; margin-bottom:.25rem}
  .drawer footer{
    padding: .8rem 1.1rem; border-top:1px solid var(--line); display:flex; gap:.6rem; align-items:center;
    background:var(--panel-2);
  }
  .drawer footer .meta{color:var(--muted); font-size:.72rem; margin-inline-start:auto; text-align:end}

  /* pricing manager + drawer intel */
  .pricing{display:grid; gap:1rem}
  .pricing table{min-width:0; width:100%}
  .pricing td{white-space:normal}
  .pricing input.name{max-width:240px}
  .pricing input.price{max-width:110px}
  .pricing select{width:auto}
  .addrow{display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; padding:.7rem}
  .addrow input{width:auto}
  .finhead{display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:.4rem; padding:.2rem .2rem 0}
  .finhead b{color:var(--gold); font-size:.95rem}
  .finhead .muted{font-size:.82rem}
  .btn--sm{padding:.35rem .8rem; font-size:.82rem}
  .btn--danger{background:transparent; color:var(--warn); border:1px solid var(--line)}
  .intel{
    background:rgba(201,162,78,.07); border:1px solid var(--line); border-radius:10px;
    padding:.7rem .8rem; display:grid; gap:.45rem; font-size:.88rem;
  }
  .intel .ok{color:var(--ok)}
  .intel .busy{color:var(--warn)}
  .intel .actions{display:flex; gap:.5rem; flex-wrap:wrap}

  /* flags on dates that carry 2+ live bookings:
     red = one of them is a confirmed booking (real double-booking danger)
     amber = only unconfirmed requests compete on the date */
  .dateflag{color:#FF8A7A; font-weight:800}
  .dateflag::before{content:'⚠ '}
  .dateflag--soft{color:#E8C377}
  .dateflag--soft::before{content:'◔ '}

  /* totals row at the bottom of finance tables */
  tfoot td{
    border-top:2px solid rgba(201,162,78,.4); border-bottom:none;
    background:rgba(201,162,78,.07); font-weight:800; color:var(--ivory);
  }
  tfoot td:first-child{color:var(--gold)}

  /* quick date-availability check: a filter button that pops the calendar, a verdict
     banner, and any real booking on that date floated to the top and flagged red */
  .dc-wrap{position:relative; display:inline-flex}
  .dc-wrap #dateCheckInput{position:absolute; inset:0; width:100%; height:100%; opacity:0; pointer-events:none; padding:0; margin:0; border:0; min-width:0}
  .dc-chip{cursor:pointer; background:var(--gold); color:#231A0E; border-color:var(--gold); font-weight:700}
  .verdict{border-radius:var(--r); padding:.7rem 1rem; margin:0 0 .9rem; font-weight:700; display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; font-size:.95rem}
  .verdict small{font-weight:500; opacity:.85; font-size:.8rem}
  .verdict.taken{background:rgba(201,60,40,.16); color:#FFB3A6; border:1px solid rgba(201,60,40,.5)}
  .verdict.adv{background:rgba(127,179,201,.14); color:#A9D2E1; border:1px solid rgba(127,179,201,.4)}
  .verdict.soft{background:rgba(201,162,78,.12); color:var(--gold); border:1px solid var(--line)}
  .verdict.free{background:rgba(134,185,138,.16); color:#A6D6AA; border:1px solid rgba(134,185,138,.4)}
  #grid tbody tr.taken{background:rgba(201,60,40,.1)}
  #grid tbody tr.taken:hover{background:rgba(201,60,40,.16)}
  #grid tbody tr.taken>td:first-child{box-shadow:inset 3px 0 0 #E0533E}
  @media (max-width:720px){ #grid tbody tr.taken{border-inline-start:3px solid #E0533E} }

  /* expandable row editor (finance / inventory) */
  .editgrid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:.6rem;
    padding:.8rem; background:var(--panel-2); border-radius:10px; margin:.3rem 0;
  }
  .editgrid .acts{grid-column:1 / -1; display:flex; gap:.5rem; flex-wrap:wrap}
  tr.fedit>td{background:rgba(201,162,78,.05); white-space:normal}
  .neg{color:var(--warn)} .pos{color:var(--ok)}

  /* analytics bars */
  .bar{display:grid; grid-template-columns:minmax(90px,auto) 1fr auto; gap:.6rem; align-items:center; padding:.25rem 0; font-size:.85rem}
  .bar i{display:block; height:8px; background:var(--gold); border-radius:4px; min-width:2px}
  .bar b{font-variant-numeric:tabular-nums}
  .statbox{padding:.8rem 1rem}
  .statbox>b{display:block; color:var(--muted); font-size:.8rem; margin-bottom:.4rem}

  /* smartphone: bookings as compact 2-line rows — name+date / city+status.
     Tap opens the drawer with everything else. ~9 clients per screen. */
  @media (max-width:720px){
    #grid{min-width:0}
    #gridbox{border:1px solid var(--line); border-radius:12px; background:var(--panel)}
    #grid thead{display:none}
    #grid, #grid tbody{display:block}
    #grid tbody tr{
      display:grid; grid-template-columns:1fr auto; column-gap:.9rem; row-gap:.1rem;
      align-items:baseline; padding:.55rem .8rem; border-bottom:1px solid var(--line);
    }
    #grid tbody td{display:none; border:none; padding:0; white-space:normal; text-align:start}
    #grid tbody td:nth-child(2){display:block; grid-column:1; grid-row:1; font-size:.95rem}
    #grid tbody td:nth-child(4){display:block; grid-column:2; grid-row:1; text-align:end; font-size:.88rem}
    #grid tbody td:nth-child(6){display:block; grid-column:1; grid-row:2; color:var(--muted); font-size:.8rem}
    #grid tbody td:nth-child(8){display:block; grid-column:2; grid-row:2; justify-self:end}
    #grid tbody td:nth-child(8) .badge{font-size:.68rem; padding:.08rem .5rem}
    #grid tbody td .wa{display:none}
  }

  #toast{
    position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%);
    background:var(--gold); color:#231A0E; font-weight:700; border-radius:999px;
    padding:.55rem 1.2rem; z-index:50; display:none;
  }
  #toast.err{background:var(--warn); color:#2B120C}
  #veil{position:fixed; inset:0; display:none; place-items:center; background:var(--bg); z-index:60; text-align:center; padding:2rem}
  @media (max-width:640px){ .drawer .body{grid-template-columns:1fr} .filters .search{max-width:none; flex:1} }
</style>
</head>
<body>

<header>
  <div class="brand"><b>سراب</b><span>مكتب الحجوزات</span></div>
  <button class="btn" id="newBtn">+ حجز جديد</button>
  <button class="btn btn--ghost" id="refreshBtn" title="تحديث">تحديث</button>
  <span class="who" id="who"></span>
</header>

<section class="kpis" id="kpis"></section>

<nav class="tabs" id="tabs">
  <button data-tab="bookings" class="on">الحجوزات</button>
  <button data-tab="callback">إعادة الاتصال</button>
  <button data-tab="finance">المالية</button>
  <button data-tab="insights">التحليلات</button>
  <button data-tab="inventory">المخزون</button>
  <button data-tab="visitors">الزوار</button>
  <button data-tab="capi">ميتا CAPI</button>
  <button data-tab="cities">أسعار المدن</button>
</nav>

<section class="filters" id="filters">
  <input class="search" id="q" type="search" placeholder="بحث: اسم، هاتف، رقم، مدينة…">
  <span class="dc-wrap">
    <button type="button" class="btn btn--ghost btn--sm" id="dateCheckBtn" title="اختر تاريخاً لفحص توفّره فوراً">📅 فحص تاريخ</button>
    <input type="date" id="dateCheckInput" aria-label="اختر تاريخاً للفحص">
  </span>
  <span class="chip dc-chip" id="dateCheckChip" style="display:none"></span>
  <div class="chips" id="statusChips"></div>
  <select id="month"><option value="">كل الشهور</option></select>
  <label class="toggle"><input type="checkbox" id="upcoming"> القادمة فقط</label>
  <label class="toggle"><input type="checkbox" id="nopast"> إخفاء الماضية</label>
  <select id="order">
    <option value="date">حسب تاريخ المناسبة</option>
    <option value="new">الأحدث إضافةً</option>
  </select>
  <button class="btn btn--ghost btn--sm" id="csvBtn" title="تنزيل النتائج الحالية كملف CSV">CSV ⬇</button>
  <span class="count" id="count"></span>
</section>

<main class="wrap">
  <div class="verdict" id="dateVerdict" style="display:none"></div>
  <div class="tablebox" id="gridbox"><table id="grid">
    <thead><tr>
      <th>الرقم</th><th>الاسم</th><th>الهاتف</th><th>تاريخ المناسبة</th><th>النوع</th>
      <th>المدينة</th><th>القاعة</th><th>الحالة</th><th>الدفع</th><th>المتبقي</th>
    </tr></thead>
    <tbody></tbody>
  </table></div>
  <div class="pricing" id="pricing" style="display:none"></div>
  <div class="pricing" id="finance" style="display:none"></div>
  <div class="pricing" id="insights" style="display:none"></div>
  <div class="pricing" id="inventory" style="display:none"></div>
  <div class="pricing" id="visitors" style="display:none"></div>
  <div class="pricing" id="capi" style="display:none"></div>
</main>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-label="تفاصيل الحجز">
  <header><h2 id="dTitle">حجز</h2></header>
  <div class="body" id="dBody"></div>
  <footer>
    <button class="btn" id="saveBtn">حفظ</button>
    <a class="btn btn--ghost" id="waBtn" target="_blank" rel="noopener">واتساب</a>
    <button class="btn btn--ghost" id="closeBtn">إغلاق</button>
    <button class="btn btn--danger btn--sm" id="delBtn" style="display:none">حذف</button>
    <span class="meta" id="dMeta"></span>
  </footer>
</aside>

<div id="toast" role="status"></div>
<div id="veil"><div>
  <h2 style="color:var(--gold)">الجلسة غير مصرّح بها</h2>
  <p class="muted">افتح المكتب عبر الرابط المحمي وسجّل الدخول ببريدك، ثم أعد تحميل الصفحة.</p>
</div></div>

<script>
'use strict';
const $ = (s, el=document) => el.querySelector(s);
const $$ = (s, el=document) => [...el.querySelectorAll(s)];

const STATUS_COLORS = {
  'استفسار':   ['rgba(194,161,121,.16)', '#C2A179'],
  'عرض سعر':   ['rgba(201,162,78,.16)',  '#C9A24E'],
  'مؤكد':      ['rgba(134,185,138,.16)', '#86B98A'],
  'دفع العربون':['rgba(127,179,201,.16)','#7FB3C9'],
  'مكتمل':     ['rgba(165,119,67,.2)',   '#BE9668'],
  'ملغي':      ['rgba(201,123,106,.16)', '#C97B6A'],
};

const state = { meta:null, rows:[], conflicts:new Set(), confirmedClashes:new Set(), tab:'bookings', filters:{ q:'', statusIn:[], statusEx:[], month:'', upcoming:false, nopast:false, order:'date', dateCheck:'' }, editing:null, remainTouched:false };

async function api(path, opts={}) {
  const res = await fetch(path, { headers:{'Content-Type':'application/json'}, ...opts });
  if (res.status === 403) { $('#veil').style.display='grid'; throw new Error('unauthorized'); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.ok === false) throw new Error(data.error || res.status);
  return data;
}

const money = (v) => (v === null || v === undefined || v === '') ? '—'
  : new Intl.NumberFormat('en-US').format(Number(v)) + ' ₪';
const dmy = (iso) => {
  if (!iso) return '—';
  const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}/${m[2]}/${m[1]}` : String(iso);
};
const waLink = (phone) => {
  const d = String(phone || '').replace(/\D/g, '');
  if (d.length < 9) return null;
  return 'https://wa.me/' + (d.startsWith('0') ? '972' + d.slice(1) : d);
};
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// The fullest name we can show. The office edits first_name/last_name but the legacy
// `name` field (set once from the website form) is never re-synced — so a record can
// carry both a short/blank `name` and a complete first+last. Prefer first+last when both
// are present (never shortening a longer stored name, e.g. a 3-part website name), then
// fall back to `name`, then to whichever part exists. Fixes short names in the grid and
// blank names in CAPI.
const fullName = (r) => {
  const parts = [r.first_name, r.last_name].filter(Boolean).join(' ').trim();
  const nm = String(r.name || '').trim();
  if (parts && (!nm || parts.length >= nm.length)) return parts;
  return nm || parts || '—';
};

function toast(msg, err=false) {
  const t = $('#toast');
  t.textContent = msg; t.className = err ? 'err' : ''; t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = 'none', 2600);
}

// ---------- rendering ----------

function renderKpis() {
  const k = state.meta.kpi;
  $('#kpis').innerHTML = `
    <div class="kpi gold"><b>${k.upcoming}</b><span>مواعيد مؤكدة قادمة</span></div>
    <div class="kpi"><b>${k.inquiries}</b><span>استفسارات مفتوحة</span></div>
    <div class="kpi"><b>${k.quotes}</b><span>عروض سعر</span></div>
    <div class="kpi gold"><b>${money(k.outstanding)}</b><span>مبالغ متبقية للتحصيل</span></div>`;
}

function renderChips() {
  const box = $('#statusChips');
  const counts = state.meta.statusCounts || {};
  const statuses = (state.meta.options.status || []);
  const f = state.filters;
  const cls = (s) => f.statusIn.includes(s) ? ' on' : f.statusEx.includes(s) ? ' ex' : '';
  box.innerHTML = `<button class="chip${!f.statusIn.length && !f.statusEx.length ? ' on' : ''}" data-s="">الكل</button>` +
    statuses.map((s) => `<button class="chip${cls(s)}" data-s="${esc(s)}"
      title="اضغط: تضمين · مرة ثانية: استبعاد ✕ · ثالثة: إلغاء">${esc(s)}${counts[s] ? ` · ${counts[s]}` : ''}</button>`).join('');
  $$('.chip', box).forEach((b) => b.onclick = () => {
    clearDateCheck(false);
    const s = b.dataset.s;
    if (!s) { f.statusIn = []; f.statusEx = []; }
    else if (f.statusIn.includes(s)) { f.statusIn = f.statusIn.filter((x) => x !== s); f.statusEx.push(s); }
    else if (f.statusEx.includes(s)) { f.statusEx = f.statusEx.filter((x) => x !== s); }
    else f.statusIn.push(s);
    renderChips();
    loadRows();
  });
}

function renderMonths() {
  const sel = $('#month');
  const cur = state.filters.month;
  sel.innerHTML = '<option value="">كل الشهور</option>' +
    (state.meta.months || []).map((m) => `<option value="${m}" ${m===cur?'selected':''}>${m.split('-')[1]} / ${m.split('-')[0]}</option>`).join('');
}

function badge(s) {
  const [bg, fg] = STATUS_COLORS[s] || ['rgba(194,161,121,.12)', 'var(--muted)'];
  return `<span class="badge" style="background:${bg};color:${fg}">${esc(s || '—')}</span>`;
}

// Status priority for the date check: real bookings first, then advance, inquiries, cancelled last.
const DATE_RANK = (s) => s === 'مؤكد' || s === 'مكتمل' ? 0 : s === 'دفع العربون' ? 1 : s === 'ملغي' ? 3 : 2;

// Verdict banner for the quick date-availability check (فحص تاريخ).
function renderVerdict(iso) {
  const el = $('#dateVerdict');
  const count = (test) => state.rows.filter(test).length;
  const actual = count((r) => r.status === 'مؤكد' || r.status === 'مكتمل');
  const adv = count((r) => r.status === 'دفع العربون');
  const soft = count((r) => r.status === 'استفسار' || r.status === 'عرض سعر');
  const d = dmy(iso);
  let cls, msg;

  else if (soft) { cls = 'soft'; msg = `🟡 التاريخ ${d} — استفسار / عرض سعر فقط (${soft}) <small>لا يوجد حجز مؤكد</small>`; }

  el.innerHTML = `<span>${msg}</span><button type="button" class="btn btn--ghost btn--sm" id="dcAnother" style="margin-inline-start:auto">فحص تاريخ آخر</button>`;
  el.style.display = '';

}

function renderRows() {
  const tb = $('#grid tbody');

  if (dc) {
    // date-availability check: float the real bookings to the top, verdict banner above
    state.rows.sort((a, b) => DATE_RANK(a.status) - DATE_RANK(b.status)
      || String(a.start_time || '').localeCompare(String(b.start_time || '')) || a.id - b.id);

      const hard = clash && state.confirmedClashes.has(r.event_date);
      const flagCls = hard ? ' dateflag' : clash ? ' dateflag dateflag--soft' : '';
      const flagTitle = hard ? 'التاريخ عليه حجز مؤكد + طلبات أخرى — خطر حجز مزدوج!'

function egrid(def, obj) {
  return '<div class="editgrid">' + def.map(([k, l, kind]) => {
    const v = obj && obj[k] != null ? obj[k] : '';
    let input;
    if (kind === 'date') input = `<input data-k="${k}" type="date" value="${esc(v)}">`;
    else if (kind === 'number') input = `<input data-k="${k}" type="number" step="any" value="${esc(v)}">`;
    else if (kind && kind.startsWith('list:')) {
      const name = kind.slice(5);
      const opts = (state.meta && state.meta.options[name]) || [];
      input = `<input data-k="${k}" list="dle_${name}" value="${esc(v)}"><datalist id="dle_${name}">${opts.map((o) => `<option value="${esc(o)}">`).join('')}</datalist>`;
    } else input = `<input data-k="${k}" value="${esc(v)}">`;
    return `<div class="field"><label>${l}</label>${input}</div>`;
  }).join('') + `<div class="acts">
      <button class="btn btn--sm esave">${obj ? 'حفظ' : 'إضافة'}</button>
      ${obj ? '<button class="btn btn--sm btn--danger edel">حذف</button>' : ''}
      <button class="btn btn--ghost btn--sm ecancel">إلغاء</button>
    </div></div>`;
}
const collectGrid = (el) => { const o = {}; $$('input[data-k]', el).forEach((i) => o[i.dataset.k] = i.value); return o; };

// Expandable rows: click a row → inline editor; the add button prepends an empty one.
function wireEditors(tablebox, def, send) {
  const closeEditors = () => $$('tr.fedit', tablebox).forEach((e) => e.remove());
  $$('tr.frow', tablebox).forEach((tr) => tr.onclick = () => {
    const wasOpen = tr.nextElementSibling && tr.nextElementSibling.classList.contains('fedit');
    closeEditors();
    if (wasOpen) return;
    const obj = JSON.parse(tr.dataset.obj);
    const ed = document.createElement('tr');
    ed.className = 'fedit';
    ed.innerHTML = `<td colspan="${tr.children.length}">${egrid(def, obj)}</td>`;
    tr.after(ed);
    $('.esave', ed).onclick = () => send('PATCH', { id: obj.id, ...collectGrid(ed) });
    $('.edel', ed).onclick = () => confirm('حذف هذا السطر نهائياً؟') && send('DELETE', { id: obj.id });
    $('.ecancel', ed).onclick = closeEditors;
  });
  const add = $('.fadd', tablebox);
  if (add) add.onclick = () => {
    closeEditors();
    const tbody = tablebox.querySelector('tbody');
    const colspan = tablebox.querySelectorAll('thead th').length;
    const ed = document.createElement('tr');
    ed.className = 'fedit';
    ed.innerHTML = `<td colspan="${colspan}">${egrid(def, null)}</td>`;
    tbody.prepend(ed);
    $('.esave', ed).onclick = () => send('POST', collectGrid(ed));
    $('.ecancel', ed).onclick = closeEditors;
  };
}

function bars(title, rows) {
  const max = Math.max(1, ...rows.map((r) => r.n));
  return `<div class="tablebox statbox"><b>${title}</b>

}

function fieldHtml([key, label, kind]) {
  const full = kind === 'textarea' ? ' full' : '';
  let input;
  if (kind === 'ro') input = `<input id="f_${key}" readonly style="opacity:.65">`;
  else if (kind === 'date') input = `<input id="f_${key}" type="date">`;
  else if (kind === 'number') input = `<input id="f_${key}" type="number" step="any" inputmode="decimal">`;
  else if (kind === 'check') input = `<input id="f_${key}" type="checkbox" style="width:auto;height:1.2rem">`;
  else if (kind === 'textarea') input = `<textarea id="f_${key}" rows="3"></textarea>`;
  else if (kind && kind.startsWith('select:')) {
    const opts = state.meta.options[kind.slice(7)] || [];
    input = `<select id="f_${key}"><option value=""></option>${opts.map((o) => `<option>${esc(o)}</option>`).join('')}</select>`;
  } else if (kind && kind.startsWith('combo:')) {
    // Real dropdown (full list, never clipped, native mobile picker) + inline "add new".
    const opts = state.meta.options[kind.slice(6)] || [];
    input = `<select id="f_${key}"><option value=""></option>${opts.map((o) => `<option>${esc(o)}</option>`).join('')}<option value="__add__">➕ نوع آخر…</option></select>`;
  } else if (kind && kind.startsWith('list:')) {
    const name = kind.slice(5);
    const opts = name === 'cities' ? (state.meta.cities || []).map((c) => c.name)
      : name === 'venues' ? (state.meta.venues || [])
      : (state.meta.options[name] || []);
    input = `<input id="f_${key}" list="dl_${name}"><datalist id="dl_${name}">${opts.map((o) => `<option value="${esc(o)}">`).join('')}</datalist>`;
  } else input = `<input id="f_${key}">`;
  return `<div class="field${full}"><label for="f_${key}">${label}</label>${input}</div>`;
}

    const row = state.editing ? state.rows.find((r) => r.id === state.editing) : null;
    const lang = (row && row.lang) || 'ar';
    const first = $('#f_first_name').value || ((row && row.name) || '').split(' ')[0] || '';
    const text = (REPLY[lang] || REPLY.ar)({
      n: first, d: dmy(date), free,
      c: match ? match.name : cityTxt, p: match ? match.price : null,
    });
    window.open(wa + '?text=' + encodeURIComponent(text), '_blank', 'noopener');
  };
}

function openDrawer(id) {
  const row = id ? state.rows.find((r) => r.id === id) : null;
  state.editing = row ? row.id : null;
  state.remainTouched = false;
  $('#dTitle').textContent = row ? `${row.booking_no || '#' + row.id} — ${fullName(row)}` : 'حجز جديد';
  $('#dBody').innerHTML = '<div class="field full intel" id="intel" style="display:none"></div>' + F.map(fieldHtml).join('');
  for (const [key,, kind] of F) {
    const el = $('#f_' + key);
    const v = row ? row[key] : (key === 'status' ? 'استفسار' : null);
    if (kind === 'check') { el.checked = v === 1 || v === true; continue; }
    // A stored value missing from the options list must never be silently blanked
    // (saving would erase it) — surface it as a real option instead.
    if (el.tagName === 'SELECT' && v && ![...el.options].some((o) => o.value === String(v))) {
      const o = document.createElement('option');
      o.value = o.textContent = String(v);
      el.appendChild(o);
    }
    el.value = v ?? '';
  }
  // occasion combo: choosing "➕ نوع آخر…" lets the owner type a brand-new type inline
  const occ = $('#f_occasion');
  if (occ && occ.tagName === 'SELECT') {
    let prev = occ.value;
    occ.addEventListener('change', () => {
      if (occ.value !== '__add__') { prev = occ.value; return; }
      const t = (prompt('اكتب نوع المناسبة الجديد:') || '').trim();
      if (t) {
        if (![...occ.options].some((o) => o.value === t)) occ.add(new Option(t, t), occ.options[occ.options.length - 1]);
        occ.value = t; prev = t;
      } else { occ.value = prev; }
    });
  }
  // remaining auto-recalcs from price − deposit (new AND existing bookings);
  // a manual edit of remaining wins for the rest of this drawer session
  $('#f_remaining').addEventListener('input', () => state.remainTouched = true);
  for (const k of ['price', 'deposit']) $('#f_' + k).addEventListener('input', () => {
    if (state.remainTouched) return;
    const p = parseFloat($('#f_price').value), d = parseFloat($('#f_deposit').value) || 0;
    if (Number.isFinite(p)) $('#f_remaining').value = p - d;
  });
  // live intel: availability for the chosen date + tier price for the city
  const intelDeb = (() => { let h; return () => { clearTimeout(h); h = setTimeout(loadIntel, 400); }; })();
  $('#f_event_date').addEventListener('change', loadIntel);
  $('#f_city').addEventListener('input', intelDeb);
  $('#f_venue').addEventListener('input', intelDeb);
  loadIntel();
  const wa = row && waLink(row.phone);
  $('#waBtn').style.display = wa ? '' : 'none';
  if (wa) $('#waBtn').href = wa;
  const del = $('#delBtn');
  del.style.display = row ? '' : 'none';
  del.onclick = !row ? null : () => {
    if (!confirm(`حذف ${row.booking_no || '#' + row.id} — ${fullName(row)} نهائياً؟ لا يمكن التراجع.`)) return;
    api('/office/api/bookings/' + row.id, { method: 'DELETE' })
      .then(() => { closeDrawer(); toast('حُذف ✓'); return Promise.all([loadMeta(), loadRows()]); })
      .catch((e) => { if (e.message !== 'unauthorized') toast('لم يُحذف', true); });
  };
  $('#dMeta').textContent = row ? `المصدر: ${row.source || '—'} · أُضيف: ${dmy(row.created_at)}${row.lang ? ' · لغة الموقع: ' + row.lang : ''}` : '';
  $('#drawer').classList.add('open'); $('#scrim').classList.add('open');
}

function closeDrawer() { $('#drawer').classList.remove('open'); $('#scrim').classList.remove('open'); }

async function save() {
  const body = {};
  for (const [key,, kind] of F) {
    if (kind === 'ro') continue;
    const el = $('#f_' + key);
    body[key] = kind === 'check' ? (el.checked ? 1 : 0) : el.value;
  }
  try {
    if (state.editing) {
      await api('/office/api/bookings/' + state.editing, { method: 'PATCH', body: JSON.stringify(body) });
      toast('تم الحفظ ✓');
    } else {
      const { row } = await api('/office/api/bookings', { method: 'POST', body: JSON.stringify(body) });
      toast(`أُنشئ ${row.booking_no} ✓`);
    }
    closeDrawer();
    await Promise.all([loadMeta(), loadRows()]);
  } catch (e) {
    if (e.message !== 'unauthorized') toast('لم يتم الحفظ — حاول مجدداً', true);
  }
}

// ---------- wiring ----------

$('#saveBtn').onclick = save;
$('#closeBtn').onclick = closeDrawer;
$('#scrim').onclick = closeDrawer;
$('#newBtn').onclick = () => openDrawer(null);
$('#refreshBtn').onclick = () => Promise.all([loadMeta(), loadRows()]).then(() => toast('تم التحديث ✓'));
$('#csvBtn').onclick = () => {
  const cols = ['booking_no','name','first_name','last_name','phone','event_date','occasion','city','region','venue',
    'status','payment_status','price','deposit','remaining','lead_source','interest','callback','notes','source','lang','created_at'];
  const csv = [cols.join(',')]
    .concat(state.rows.map((r) => cols.map((c) => `"${String(r[c] ?? '').replace(/"/g, '""')}"`).join(',')))
    .join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' }));
  a.download = 'sarab-bookings.csv';
  a.click();
  URL.revokeObjectURL(a.href);
};

// ---------- quick date-availability check (فحص تاريخ) ----------
function openDatePicker() {
  const inp = $('#dateCheckInput');
  try { inp.showPicker(); } catch { inp.focus(); }
}
function setDateCheck(iso) {
  if (!iso) return;
  state.filters.dateCheck = iso;
  const chip = $('#dateCheckChip');
  chip.textContent = `📅 ${dmy(iso)} ✕`;
  chip.style.display = '';
  loadRows();
}
// Leaving the check returns to the normal list. reload=false when another filter is taking
// over (it will load itself); reload=true when the owner explicitly clears the check.
function clearDateCheck(reload) {
  const was = state.filters.dateCheck;
  state.filters.dateCheck = '';
  $('#dateCheckInput').value = '';
  $('#dateCheckChip').style.display = 'none';
  $('#dateVerdict').style.display = 'none';
  if (reload && was) loadRows();
}
$('#dateCheckBtn').onclick = openDatePicker;
$('#dateCheckInput').onchange = (e) => setDateCheck(e.target.value);
$('#dateCheckChip').onclick = () => clearDateCheck(true);

let qTimer;
$('#q').addEventListener('input', (e) => {
  clearTimeout(qTimer);
  qTimer = setTimeout(() => { clearDateCheck(false); state.filters.q = e.target.value.trim(); loadRows(); }, 300);
});
$('#month').onchange = (e) => { clearDateCheck(false); state.filters.month = e.target.value; loadRows(); };
$('#upcoming').onchange = (e) => { clearDateCheck(false); state.filters.upcoming = e.target.checked; loadRows(); };
$('#nopast').onchange = (e) => { clearDateCheck(false); state.filters.nopast = e.target.checked; loadRows(); };
$('#order').onchange = (e) => { clearDateCheck(false); state.filters.order = e.target.value; loadRows(); };

const PANES = { bookings: '#gridbox', callback: '#gridbox', cities: '#pricing', finance: '#finance', insights: '#insights', inventory: '#inventory', visitors: '#visitors', capi: '#capi' };
$$('#tabs button').forEach((b) => b.onclick = () => {
  $$('#tabs button').forEach((x) => x.classList.toggle('on', x === b));
  state.tab = b.dataset.tab;
  const pane = PANES[state.tab];
  $('#filters').style.display = pane === '#gridbox' ? '' : 'none';
  $('#dateVerdict').style.display = 'none';
  for (const sel of ['#gridbox', '#pricing', '#finance', '#insights', '#inventory', '#visitors', '#capi']) $(sel).style.display = sel === pane ? '' : 'none';
  if (state.tab === 'cities') loadPricing().catch(() => {});
  else if (state.tab === 'finance') loadFinance().catch(() => {});
  else if (state.tab === 'insights') loadInsights().catch(() => {});
  else if (state.tab === 'inventory') loadInventory().catch(() => {});
  else if (state.tab === 'visitors') loadVisitors().catch(() => {});
  else if (state.tab === 'capi') loadCapi().catch(() => {});
  else loadRows();
});

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

(async function init() {
  try {
    await loadMeta();
    await loadRows();
  } catch (e) { /* veil already shown on 403 */ }
})();
</script>
</body>
</html>
