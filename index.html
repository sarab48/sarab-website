<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#14100B" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>SARAB · AI Photobooth</title>
    <meta name="description" content="SARAB — AI Photobooth. An ordinary photo goes in; a studio-quality portrait comes out, in seconds. No photographer. No studio. No waiting." />

    <!-- Open Graph (Facebook / WhatsApp / Instagram link previews).
         NOTE: og:url and the og:image path resolve against the deployed origin. When the
         production domain is known, optionally make og:image absolute (https://domain/og-image.jpg)
         for the strictest scrapers. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SARAB" />
    <meta property="og:title" content="SARAB — AI Photobooth" />
    <meta property="og:description" content="An ordinary photo goes in; a studio-quality portrait comes out, in seconds. No photographer. No studio. No waiting." />
    <meta property="og:image" content="https://sarabaibooth.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="SARAB · AI Photobooth — your photo, your style" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_AR" />
    <meta property="og:locale:alternate" content="he_IL" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SARAB — AI Photobooth" />
    <meta name="twitter:description" content="An ordinary photo goes in; a studio-quality portrait comes out, in seconds. No photographer. No studio. No waiting." />
    <meta name="twitter:image" content="/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
